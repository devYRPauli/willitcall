id = "multi-turn-parallel-followup"
category = "multi_turn"
description = "Feed two parallel results into one follow-up call."
rationale = "This asserts combining two parallel lookup results in one follow-up call; the city order is defined by the prompt and schema descriptions, and the values come verbatim from tool-result JSON. Turn 1 expects only lookups because the temperatures are not known yet, so an early comparison would invent them."

[[tools]]
name = "get_temperature"
description = "Get the temperature for a city."
[tools.parameters]
type = "object"
required = ["city"]
[tools.parameters.properties.city]
type = "string"

[[tools]]
name = "compare_temperatures"
description = "Compare two named city temperatures."
[tools.parameters]
type = "object"
required = ["first_city", "first_value", "second_city", "second_value"]
[tools.parameters.properties.first_city]
type = "string"
description = "The city the user mentioned first."
[tools.parameters.properties.first_value]
type = "number"
[tools.parameters.properties.second_city]
type = "string"
description = "The city the user mentioned second."
[tools.parameters.properties.second_value]
type = "number"

[tool_choice]
mode = "auto"

[[turns]]
[[turns.messages]]
role = "user"
content = "Get temperatures for Boston and Tokyo, then compare the returned values."

[[turns.expected_calls]]
name = "get_temperature"
[turns.expected_calls.arguments]
city = "Boston"

[[turns.expected_calls]]
name = "get_temperature"
[turns.expected_calls.arguments]
city = "Tokyo"

[[turns]]
[[turns.messages]]
role = "tool"
content = '{"city":"Boston","temperature":21}'
tool_call_ref = 0

[[turns.messages]]
role = "tool"
content = '{"city":"Tokyo","temperature":28}'
tool_call_ref = 1

[[turns.expected_calls]]
name = "compare_temperatures"
[turns.expected_calls.arguments]
first_city = "Boston"
first_value = 21
second_city = "Tokyo"
second_value = 28
