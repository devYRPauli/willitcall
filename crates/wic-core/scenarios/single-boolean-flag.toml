id = "single-boolean-flag"
category = "single_call"
description = "Call one tool with a boolean argument."
rationale = "This asserts encoding a disabled state as the boolean false. The opaque feature name audit-log is supplied verbatim, and the imperative Disable pins the boolean without relying on a paraphrasable text answer."

[[tools]]
name = "set_feature"
description = "Enable or disable a feature."

[tools.parameters]
type = "object"
required = ["feature", "enabled"]

[tools.parameters.properties.feature]
type = "string"

[tools.parameters.properties.enabled]
type = "boolean"

[tool_choice]
mode = "auto"

[[turns]]
[[turns.messages]]
role = "user"
content = "Disable the feature named audit-log."

[[turns.expected_calls]]
name = "set_feature"

[turns.expected_calls.arguments]
feature = "audit-log"
enabled = false
