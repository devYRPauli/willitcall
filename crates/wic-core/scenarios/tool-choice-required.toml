id = "tool-choice-required"
category = "tool_choice_modes"
description = "Require one tool call with explicit arguments."
rationale = "This asserts honoring required tool choice with an explicit argument. The API request enforces a call, lookup_order is the only offered tool, and opaque order id ORD-204 appears verbatim in the prompt."

[[tools]]
name = "lookup_order"
description = "Look up an order by exact id."

[tools.parameters]
type = "object"
required = ["order_id"]

[tools.parameters.properties.order_id]
type = "string"

[tool_choice]
mode = "required"

[[turns]]
[[turns.messages]]
role = "user"
content = "Look up order ORD-204."

[[turns.expected_calls]]
name = "lookup_order"

[turns.expected_calls.arguments]
order_id = "ORD-204"
