id = "tool-choice-named-empty"
category = "tool_choice_modes"
description = "Force a named empty-argument function."
rationale = "This asserts honoring a named tool choice when another tool is offered. The API request enforces current_region, and its schema has no properties, so the model has no discretion over the tool or arguments."

[[tools]]
name = "current_region"
description = "Get the current deployment region."
[tools.parameters]
type = "object"

[[tools]]
name = "current_zone"
description = "Get the current deployment zone."
[tools.parameters]
type = "object"

[tool_choice]
mode = "named"
name = "current_region"

[[turns]]
[[turns.messages]]
role = "user"
content = "Get the current deployment region."

[[turns.expected_calls]]
name = "current_region"

