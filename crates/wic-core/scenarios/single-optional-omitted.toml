id = "single-optional-omitted"
category = "single_call"
description = "Omit an optional argument that the prompt does not provide."
rationale = "This asserts omitting an optional schema field rather than inventing it. The prompt gives the exact search query and explicitly says not to set a result limit, so the exact expected object is complete."

[[tools]]
name = "search_catalog"
description = "Search a catalog with an optional result limit."

[tools.parameters]
type = "object"
required = ["query"]

[tools.parameters.properties.query]
type = "string"

[tools.parameters.properties.limit]
type = "integer"

[tool_choice]
mode = "auto"

[[turns]]
[[turns.messages]]
role = "user"
content = "Search the catalog for brass compass. Do not set a result limit."

[[turns.expected_calls]]
name = "search_catalog"

[turns.expected_calls.arguments]
query = "brass compass"
