id = "tool-choice-auto-call"
category = "tool_choice_modes"
description = "Use auto tool choice when a tool is clearly needed."
rationale = "This asserts choosing a needed lookup under auto tool choice, where the API leaves call-or-text discretion to the model. The requested temperature requires the only offered tool, and Helsinki is supplied verbatim as its city argument."

[[tools]]
name = "get_temperature"
description = "Get the temperature for a city."

[tools.parameters]
type = "object"
required = ["city"]

[tools.parameters.properties.city]
type = "string"

[tool_choice]
mode = "auto"

[[turns]]
[[turns.messages]]
role = "user"
content = "Get the temperature in Helsinki."

[[turns.expected_calls]]
name = "get_temperature"

[turns.expected_calls.arguments]
city = "Helsinki"
