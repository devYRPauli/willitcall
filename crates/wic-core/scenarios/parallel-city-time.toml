id = "parallel-city-time"
category = "parallel_calls"
description = "Call the time tool for two cities in parallel."
rationale = "This asserts emitting both city-time calls in one response, so a model that can only call sequentially genuinely lacks the measured capability. Boston and Tokyo are literal prompt values that pin both arguments."

[[tools]]
name = "get_time"
description = "Get the local time for a city."

[tools.parameters]
type = "object"
required = ["city"]

[tools.parameters.properties.city]
type = "string"

[tool_choice]
mode = "required"

[[turns]]

[[turns.messages]]
role = "user"
content = "What time is it in Boston and Tokyo?"

[[turns.expected_calls]]
name = "get_time"

[turns.expected_calls.arguments]
city = "Boston"

[[turns.expected_calls]]
name = "get_time"

[turns.expected_calls.arguments]
city = "Tokyo"
