id = "single-date-range"
category = "single_call"
description = "Call one tool with multiple required arguments."
rationale = "This asserts populating all fields of an inclusive date-range call. Denver and both ISO dates are supplied verbatim, while from and through map unambiguously to the named start_date and end_date parameters."

[[tools]]
name = "find_events"
description = "Find events in an inclusive date range."

[tools.parameters]
type = "object"
required = ["city", "start_date", "end_date"]

[tools.parameters.properties.city]
type = "string"

[tools.parameters.properties.start_date]
type = "string"

[tools.parameters.properties.end_date]
type = "string"

[tool_choice]
mode = "auto"

[[turns]]
[[turns.messages]]
role = "user"
content = "Find events in Denver from 2026-08-03 through 2026-08-05."

[[turns.expected_calls]]
name = "find_events"

[turns.expected_calls.arguments]
city = "Denver"
start_date = "2026-08-03"
end_date = "2026-08-05"
