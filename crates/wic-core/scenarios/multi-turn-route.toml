id = "multi-turn-route"
category = "multi_turn"
description = "Use a geocode result in a follow-up route call."
rationale = "This asserts passing exact geocode coordinates into a follow-up route call. Turn 1 ignores arguments because a correct model may geocode Fenway Park, Boston, MA, while turn 2 is pinned verbatim by the tool-result JSON."

[[tools]]
name = "geocode"
description = "Resolve a place to coordinates."

[tools.parameters]
type = "object"
required = ["place"]

[tools.parameters.properties.place]
type = "string"

[[tools]]
name = "get_route"
description = "Get a route to coordinates."

[tools.parameters]
type = "object"
required = ["latitude", "longitude"]

[tools.parameters.properties.latitude]
type = "number"

[tools.parameters.properties.longitude]
type = "number"

[tool_choice]
mode = "auto"

[[turns]]

[[turns.messages]]
role = "user"
content = "Find a route to Fenway Park."

[[turns.expected_calls]]
name = "geocode"
arguments_match = "ignore"

[turns.expected_calls.arguments]
place = "Fenway Park"

[[turns]]

[[turns.messages]]
role = "tool"
content = '{"latitude":42.3467,"longitude":-71.0972}'
tool_call_ref = 0

[[turns.expected_calls]]
name = "get_route"

[turns.expected_calls.arguments]
latitude = 42.3467
longitude = -71.0972
