id = "negative-greeting"
category = "negative_trap"
description = "Do not call a tool for a simple greeting."
rationale = "This asserts honoring a no-tools request for a greeting. The API request enforces tool_choice none, so tool calls are forbidden and the unscored wording of the short text reply cannot cause a false red."

[[tools]]
name = "get_weather"
description = "Get the current weather for a city."

[tools.parameters]
type = "object"
required = ["city"]

[tools.parameters.properties.city]
type = "string"

[tool_choice]
mode = "none"

[[turns]]

[[turns.messages]]
role = "user"
content = "Say hello in one short sentence."
