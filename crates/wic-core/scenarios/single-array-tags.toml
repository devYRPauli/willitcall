id = "single-array-tags"
category = "single_call"
description = "Call one tool with an array of strings."
rationale = "This asserts an exact string-array argument for document doc-17. Array comparison is positional, and the prompt supplies every literal tag and says in that order, so the expected sequence is fully pinned."

[[tools]]
name = "tag_document"
description = "Apply tags to a document."

[tools.parameters]
type = "object"
required = ["document_id", "tags"]

[tools.parameters.properties.document_id]
type = "string"

[tools.parameters.properties.tags]
type = "array"

[tools.parameters.properties.tags.items]
type = "string"

[tool_choice]
mode = "auto"

[[turns]]
[[turns.messages]]
role = "user"
content = "Tag document doc-17 with exactly alpha, beta, and gamma in that order."

[[turns.expected_calls]]
name = "tag_document"

[turns.expected_calls.arguments]
document_id = "doc-17"
tags = ["alpha", "beta", "gamma"]
