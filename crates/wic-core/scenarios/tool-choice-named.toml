id = "tool-choice-named"
category = "tool_choice_modes"
description = "Force one named function from two available tools."
rationale = "This asserts honoring a named tool choice among two tools. The API request enforces search_contacts rather than leaving tool selection to the model, and the opaque name Ada Stone is supplied verbatim for the required argument."

[[tools]]
name = "search_files"
description = "Search files for an exact phrase."
[tools.parameters]
type = "object"
required = ["phrase"]
[tools.parameters.properties.phrase]
type = "string"

[[tools]]
name = "search_contacts"
description = "Search contacts for an exact name."
[tools.parameters]
type = "object"
required = ["name"]
[tools.parameters.properties.name]
type = "string"

[tool_choice]
mode = "named"
name = "search_contacts"

[[turns]]
[[turns.messages]]
role = "user"
content = "Search contacts for Ada Stone."

[[turns.expected_calls]]
name = "search_contacts"

[turns.expected_calls.arguments]
name = "Ada Stone"
