id = "parallel-two-calculations"
category = "parallel_calls"
description = "Call the same arithmetic tool twice in parallel."
rationale = "This asserts emitting both division calls in one response, so sequential-only calling is a true red. Division is non-commutative, and the named dividend and divisor parameters plus the literal prompt wording force operand position."

[[tools]]
name = "divide"
description = "Divide one number by another."

[tools.parameters]
type = "object"
required = ["dividend", "divisor"]

[tools.parameters.properties.dividend]
type = "number"

[tools.parameters.properties.divisor]
type = "number"

[tool_choice]
mode = "required"

[[turns]]
[[turns.messages]]
role = "user"
content = "Use separate calls to divide 42 by 6 and divide 10 by 4."

[[turns.expected_calls]]
name = "divide"
[turns.expected_calls.arguments]
dividend = 42
divisor = 6

[[turns.expected_calls]]
name = "divide"
[turns.expected_calls.arguments]
dividend = 10
divisor = 4
