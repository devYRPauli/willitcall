id = "single-optional-present"
category = "single_call"
description = "Include an optional argument when explicitly provided."
rationale = "This asserts including an optional limit when the user supplies it. The prompt gives brass compass verbatim as the search query and says exactly 4 results, which pins both expected arguments."

[[tools]]
name = "search_catalog"
description = "Search a catalog with an optional result limit."

[tools.parameters]
type = "object"
required = ["query"]

[tools.parameters.properties.query]
type = "string"

[tools.parameters.properties.limit]
type = "integer"

[tool_choice]
mode = "auto"

[[turns]]
[[turns.messages]]
role = "user"
content = "Search the catalog for brass compass and return exactly 4 results."

[[turns.expected_calls]]
name = "search_catalog"

[turns.expected_calls.arguments]
query = "brass compass"
limit = 4
