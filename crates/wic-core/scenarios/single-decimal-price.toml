id = "single-decimal-price"
category = "single_call"
description = "Call one tool with a decimal number."
rationale = "This asserts preserving a decimal numeric argument in a price call. The opaque SKU AX-9 and exact value 19.95 are supplied verbatim in the prompt, so neither field admits a legitimate rewording."

[[tools]]
name = "set_price"
description = "Set the price of a product."

[tools.parameters]
type = "object"
required = ["sku", "price"]

[tools.parameters.properties.sku]
type = "string"

[tools.parameters.properties.price]
type = "number"

[tool_choice]
mode = "auto"

[[turns]]
[[turns.messages]]
role = "user"
content = "Set the price of SKU AX-9 to exactly 19.95."

[[turns.expected_calls]]
name = "set_price"

[turns.expected_calls.arguments]
sku = "AX-9"
price = 19.95
