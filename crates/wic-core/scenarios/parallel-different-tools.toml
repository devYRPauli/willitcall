id = "parallel-different-tools"
category = "parallel_calls"
description = "Call two different tools in parallel."
rationale = "This asserts emitting weather and time calls together in one response, so sequential-only calling is a true red. The prompt maps the literal Oslo and Cairo values to distinct named tools, leaving no argument ambiguity."

[[tools]]
name = "get_weather"
description = "Get weather for a city."

[tools.parameters]
type = "object"
required = ["city"]

[tools.parameters.properties.city]
type = "string"

[[tools]]
name = "get_time"
description = "Get local time for a city."

[tools.parameters]
type = "object"
required = ["city"]

[tools.parameters.properties.city]
type = "string"

[tool_choice]
mode = "required"

[[turns]]
[[turns.messages]]
role = "user"
content = "Get the weather in Oslo and the local time in Cairo."

[[turns.expected_calls]]
name = "get_weather"

[turns.expected_calls.arguments]
city = "Oslo"

[[turns.expected_calls]]
name = "get_time"

[turns.expected_calls.arguments]
city = "Cairo"
