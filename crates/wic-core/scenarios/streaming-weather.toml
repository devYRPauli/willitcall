id = "streaming-weather"
category = "streaming"
description = "Stream one weather tool call."
rationale = "This asserts reconstructing a basic tool call from streamed output. The API request enforces the named get_weather tool, and the prompt supplies Seattle verbatim as its only required argument."
stream = true

[[tools]]
name = "get_weather"
description = "Get the current weather for a city."

[tools.parameters]
type = "object"
required = ["city"]

[tools.parameters.properties.city]
type = "string"

[tool_choice]
mode = "named"
name = "get_weather"

[[turns]]

[[turns.messages]]
role = "user"
content = "Use get_weather for Seattle."

[[turns.expected_calls]]
name = "get_weather"

[turns.expected_calls.arguments]
city = "Seattle"
