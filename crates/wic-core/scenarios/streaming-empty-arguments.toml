id = "streaming-empty-arguments"
category = "streaming"
description = "Stream a call to a function with no arguments."
rationale = "This asserts reconstructing an empty argument object from a streamed call. The API request requires tool use, get_uptime is the only offered tool, and its schema has no properties, so the expected call is forced."
stream = true

[[tools]]
name = "get_uptime"
description = "Get service uptime."

[tools.parameters]
type = "object"

[tool_choice]
mode = "required"

[[turns]]
[[turns.messages]]
role = "user"
content = "Get the service uptime."

[[turns.expected_calls]]
name = "get_uptime"

[turns.expected_calls.arguments]
