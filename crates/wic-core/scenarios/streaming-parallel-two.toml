id = "streaming-parallel-two"
category = "streaming"
description = "Stream two different tool calls."
rationale = "This asserts reconstructing two parallel calls from one streamed response, so sequential-only calling is a true red. The prompt explicitly maps literal Prague to weather and Manila to time, pinning both tool-argument pairs."
stream = true

[[tools]]
name = "get_weather"
description = "Get weather for a city."
[tools.parameters]
type = "object"
required = ["city"]
[tools.parameters.properties.city]
type = "string"

[[tools]]
name = "get_time"
description = "Get local time for a city."
[tools.parameters]
type = "object"
required = ["city"]
[tools.parameters.properties.city]
type = "string"

[tool_choice]
mode = "required"

[[turns]]
[[turns.messages]]
role = "user"
content = "Get the weather in Prague and the local time in Manila."

[[turns.expected_calls]]
name = "get_weather"
[turns.expected_calls.arguments]
city = "Prague"

[[turns.expected_calls]]
name = "get_time"
[turns.expected_calls.arguments]
city = "Manila"
