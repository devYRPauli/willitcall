id = "parallel-three-cities"
category = "parallel_calls"
description = "Call the same tool three times in parallel."
rationale = "This asserts emitting three weather calls in one response, so a model that calls them only sequentially genuinely lacks the capability. Austin, Dublin, and Seoul are supplied verbatim and the prompt explicitly requests three calls."

[[tools]]
name = "get_weather"
description = "Get weather for a city."

[tools.parameters]
type = "object"
required = ["city"]

[tools.parameters.properties.city]
type = "string"

[tool_choice]
mode = "required"

[[turns]]
[[turns.messages]]
role = "user"
content = "Get weather for Austin, Dublin, and Seoul with three calls."

[[turns.expected_calls]]
name = "get_weather"
[turns.expected_calls.arguments]
city = "Austin"

[[turns.expected_calls]]
name = "get_weather"
[turns.expected_calls.arguments]
city = "Dublin"

[[turns.expected_calls]]
name = "get_weather"
[turns.expected_calls.arguments]
city = "Seoul"
