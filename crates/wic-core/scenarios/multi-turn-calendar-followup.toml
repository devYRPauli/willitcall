id = "multi-turn-calendar-followup"
category = "multi_turn"
description = "Use a calendar lookup result in a follow-up event call."

[[tools]]
name = "get_calendar"
description = "Get calendar availability for a date."
[tools.parameters]
type = "object"
required = ["date"]
[tools.parameters.properties.date]
type = "string"

[[tools]]
name = "create_event"
description = "Create an event at an exact date and time."
[tools.parameters]
type = "object"
required = ["title", "date", "time"]
[tools.parameters.properties.title]
type = "string"
[tools.parameters.properties.date]
type = "string"
[tools.parameters.properties.time]
type = "string"

[tool_choice]
mode = "auto"

[[turns]]
[[turns.messages]]
role = "user"
content = "Check my calendar on 2026-08-11, then create event Review at the available time."

[[turns.expected_calls]]
name = "get_calendar"
[turns.expected_calls.arguments]
date = "2026-08-11"

[[turns]]
[[turns.messages]]
role = "tool"
content = '{"available_time":"15:30"}'
tool_call_ref = 0

[[turns.expected_calls]]
name = "create_event"
[turns.expected_calls.arguments]
title = "Review"
date = "2026-08-11"
time = "15:30"
