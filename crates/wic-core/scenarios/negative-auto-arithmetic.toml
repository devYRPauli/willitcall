id = "negative-auto-arithmetic"
category = "negative_trap"
description = "Do not call an irrelevant tool for simple arithmetic."

[[tools]]
name = "get_weather"
description = "Get weather for a city."

[tools.parameters]
type = "object"
required = ["city"]

[tools.parameters.properties.city]
type = "string"

[tool_choice]
mode = "auto"

[[turns]]
[[turns.messages]]
role = "user"
content = "What is 19 plus 23? Answer without using a tool."
